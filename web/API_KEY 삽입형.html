<!DOCTYPE html> 
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>로봇 블록 놀이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky-top: #BFE8FF;
    --sky-bot: #FFF6E0;
    --ink: #2E3350;
    --card: #FFFFFF;
    --forward: #3FB27F;
    --backward: #FF70B8;
    --turn: #4C8DFF;
    --buzzer: #FFC93C;
    --wait: #A784FF;
    --repeat: #FF7A59;
    --if-cls: #FF4B4B;
    --danger: #FF4B4B;
    --shadow: 0 6px 0 rgba(0,0,0,0.12);
  }

  body.dark-mode {
    --sky-top: #1a1a2e;
    --sky-bot: #16213e;
    --ink: #f5f6fa;
    --card: rgba(30, 30, 46, 0.85);
  }

  *{box-sizing:border-box;}
  html,body{min-height:100%;}
  body{
    margin:0;
    font-family:'Gaegu','Jua',sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%, var(--sky-bot) 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overscroll-behavior:none;
    -webkit-tap-highlight-color: transparent;
    user-select:none;
    overflow-x: hidden;
    overflow-y: auto;
    transition: background 0.3s ease;
  }
  h1,h2,.title-font{font-family:'Jua',sans-serif;}

  header{
    padding:16px 20px 8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-shrink: 0;
  }
  header h1{ margin:0; font-size:26px; color:var(--ink); }
  
  #connState{
    font-size:14px; padding:6px 14px; border-radius:20px;
    background:#fff;
    box-shadow:var(--shadow);
  }
  #connState.ok{background:#DFFFEA; color:#2E3350;}
  #connState.bad{background:#FFE3E3; color:#2E3350;}
  body.dark-mode #connState { background: #333; color: #fff; }

  #connectPanel{
    display:flex; gap:8px; align-items:center;
    background:rgba(255,255,255,0.6);
    padding:10px 14px; border-radius:16px;
    margin:0 16px 10px; font-size:14px;
    flex-wrap:wrap; flex-shrink: 0;
    transition: background 0.3s ease;
  }
  body.dark-mode #connectPanel { background: rgba(30, 30, 46, 0.75); }
  
  #connectPanel input{
    flex:1; min-width:140px; padding:8px 10px; border-radius:10px;
    border:1px solid #cfd6e6; font-size:14px;
  }
  body.dark-mode #connectPanel input { background: #2a2a3b; color: #fff; border-color: #444; }

  #connectPanel button{
    padding:8px 14px; border-radius:10px; border:none;
    background:var(--turn); color:#fff; cursor:pointer;
  }
  #simToggle{
    padding:8px 12px; border-radius:10px; border:none; cursor:pointer;
    background:#EDE7FF; color:#5b4b9c; font-size:13px;
  }
  #simToggle.on{background:#A784FF; color:#fff;}

  #aiPanel{
    display:flex; flex-direction:column; gap:8px;
    background:rgba(255,255,255,0.68);
    padding:12px 14px; border-radius:18px;
    margin:0 16px 10px; flex-shrink:0;
    box-shadow:0 4px 0 rgba(0,0,0,0.06);
    transition: background 0.3s ease;
  }
  body.dark-mode #aiPanel{ background:rgba(30, 30, 46, 0.78); }
  .aiTitle{
    display:flex; justify-content:space-between; align-items:center;
    gap:10px; flex-wrap:wrap;
  }
  .aiTitleText{display:flex; flex-direction:column; gap:2px; flex:1; min-width:220px;}
  .aiToggleBtn{
    border:none; background:rgba(0,0,0,0.08); padding:6px 12px;
    border-radius:12px; cursor:pointer; font-family:'Jua',sans-serif;
    color:var(--ink); white-space:nowrap;
  }
  body.dark-mode .aiToggleBtn{background:rgba(255,255,255,0.12);}
  .aiBody{display:flex; flex-direction:column; gap:8px;}
  #aiPanel.collapsed .aiBody{display:none;}
  .aiTitle strong{font-family:'Jua',sans-serif; font-size:17px;}
  .aiTitle small{color:#6f7790; font-size:13px;}
  body.dark-mode .aiTitle small{color:#c5c8d8;}
  #aiPrompt{
    width:100%; min-height:48px; max-height:110px; resize:vertical;
    border:1px solid #cfd6e6; border-radius:14px;
    padding:10px 12px; font-size:16px; font-family:'Gaegu',sans-serif;
    outline:none; color:#2E3350;
  }
  #aiPrompt:focus{border-color:var(--turn); box-shadow:0 0 0 3px rgba(76,141,255,0.16);}
  body.dark-mode #aiPrompt{background:#2a2a3b; color:#fff; border-color:#444;}
  .aiControls{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .aiControls button, .aiChip{
    border:none; border-radius:12px; padding:8px 12px;
    cursor:pointer; font-family:'Jua',sans-serif; font-size:14px;
  }
  #aiGenerateBtn{background:#6FE39B; color:#174b2f;}
  #aiReplaceBtn{background:#4C8DFF; color:#fff;}
  #aiClearBtn{background:#FFE3E3; color:#9b2424;}
  .aiChip{background:#fff; color:#4b5470; box-shadow:0 2px 0 rgba(0,0,0,0.08);}
  body.dark-mode .aiChip{background:#33374f; color:#fff;}
  #aiResult{
    display:none; background:rgba(46,51,80,0.06); border-radius:14px;
    padding:8px 10px; font-size:14px; line-height:1.45;
  }
  body.dark-mode #aiResult{background:rgba(255,255,255,0.08);}
  .aiPreviewBlock{
    display:inline-flex; align-items:center; gap:4px;
    margin:3px 4px 3px 0; padding:5px 8px;
    background:#fff; color:#2E3350; border-radius:999px;
    font-size:13px;
  }
  body.dark-mode .aiPreviewBlock{background:#33374f; color:#fff;}

  main{
    flex:1; display:flex; flex-direction:column;
    gap:14px; padding:0 16px 160px; overflow: visible;
  }

  #palette{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr));
    gap:10px; background:rgba(255,255,255,0.6);
    padding:12px; border-radius:20px; flex-shrink: 0;
    transition: all 0.3s ease;
  }
  body.dark-mode #palette { background: rgba(30, 30, 46, 0.75); }

  .paletteBtn{
    min-height:72px; border:none; border-radius:18px;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:4px; font-size:14px;
    font-family:'Gaegu',sans-serif; color:#fff;
    cursor:pointer; box-shadow:var(--shadow); transition:transform .08s ease;
  }
  .paletteBtn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,0.12);}
  .paletteBtn .emoji{font-size:30px;}
  
  .pb-forward{background:var(--forward);}
  .pb-backward{background:var(--backward);}
  .pb-turn_left{background:var(--turn);}
  .pb-turn_right{background:var(--turn);}
  .pb-buzzer{background:var(--buzzer); color:#5b4600;}
  .pb-wait{background:var(--wait);}
  .pb-repeat{background:var(--repeat);}
  .pb-if{background:var(--if-cls);}

  #programArea{
    background:rgba(255,255,255,0.55); border-radius:20px;
    padding:14px; flex: 1; display: flex; flex-direction: column;
    overflow: visible; transition: background 0.3s ease;
  }
  body.dark-mode #programArea { background: rgba(30, 30, 46, 0.75); }
  #programArea h2{margin:0; font-size:18px; flex-shrink: 0;}
  
  #programList{
    list-style:none; margin:0; padding:0; display:flex; flex-direction:column;
    gap:10px; flex: 1; overflow: visible;
    -webkit-overflow-scrolling: touch; padding-right: 4px;
    min-height: 260px;
  }
  #programList::-webkit-scrollbar { width: 6px; }
  #programList::-webkit-scrollbar-track { background: transparent; }
  #programList::-webkit-scrollbar-thumb { background: rgba(46, 51, 80, 0.3); border-radius: 10px; }
  #programList::-webkit-scrollbar-thumb:hover { background: rgba(46, 51, 80, 0.5); }

  #emptyHint{ text-align:center; color:#8891B0; padding:24px 8px; font-size:16px; pointer-events: none; }

  .block{
    display:flex; align-items:center; gap:10px; padding:12px 14px;
    border-radius:16px; color:#fff; box-shadow:var(--shadow);
    min-height:60px; cursor:grab; position:relative; flex-shrink: 0;
  }
  .block.dragging{opacity:.4;}
  .block .emoji{font-size:26px; flex-shrink:0;}
  .block .label{flex:1; font-size:17px;}
  .block .stepper{
    display:flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.25); border-radius:12px; padding:2px 6px;
  }
  .block .stepper button{
    width:34px;height:34px; border:none;border-radius:10px;
    background:rgba(255,255,255,0.9); font-size:18px; font-weight:bold;
    cursor:pointer; color: #2E3350;
  }
  .block .stepper .val{min-width:34px; text-align:center; font-size:16px;}
  .block .delBtn, .block .outBtn{
    height:34px; border:none;border-radius:10px;
    background:rgba(0,0,0,0.15); color:#fff; font-size:16px;
    cursor:pointer; flex-shrink:0;
  }
  .block .delBtn{width:34px;}
  .block .outBtn{
    min-width:66px; padding:0 8px;
    background:rgba(255,255,255,0.30); font-size:14px; font-family:'Jua',sans-serif;
  }
  .block .outBtn:hover, .block .delBtn:hover{background:rgba(0,0,0,0.25);}

  .rootDropZone{
    list-style:none; min-height:58px; border-radius:16px;
    border:3px dashed rgba(76,141,255,0.35);
    display:flex; align-items:center; justify-content:center;
    color:#4C8DFF; font-family:'Jua',sans-serif; font-size:16px;
    background:rgba(255,255,255,0.35); transition:all .16s ease; flex-shrink:0;
  }
  .rootDropZone.drag-root{
    border-color:#4C8DFF; background:rgba(76,141,255,0.16); transform:scale(1.01);
  }
  body.dark-mode .rootDropZone{background:rgba(30,30,46,0.55); color:#9dbbff;}
  body.dark-mode .rootDropZone.drag-root{background:rgba(76,141,255,0.28);}
  
  .b-forward{background:var(--forward);}
  .b-backward{background:var(--backward);}
  .b-turn_left{background:var(--turn);}
  .b-turn_right{background:var(--turn);}
  .b-buzzer{background:var(--buzzer); color:#5b4600;}
  .b-wait{background:var(--wait);}
  .b-repeat{background:var(--repeat); flex-wrap:wrap;}
  .b-if{background:var(--if-cls); flex-wrap:wrap;}

  .repeatChildren{
    width:100%; margin-top:8px; padding:12px 8px 8px; border-radius:12px;
    background:rgba(255,255,255,0.2); display:flex; flex-direction:column; gap:8px;
    min-height: 65px; transition: all 0.2s ease;
  }
  body.dark-mode .repeatChildren { background:rgba(0,0,0,0.3); }

  .block.drag-top::before {
    content: ''; position: absolute; top: -7px; left: 0; right: 0; height: 5px;
    background: #4C8DFF; border-radius: 3px; z-index: 10;
  }
  .block.drag-bottom::after {
    content: ''; position: absolute; bottom: -7px; left: 0; right: 0; height: 5px;
    background: #4C8DFF; border-radius: 3px; z-index: 10;
  }
  
  .repeatChildren.drag-inside {
    background: rgba(76, 141, 255, 0.2) !important; outline: 3px dashed #4C8DFF !important;
  }
  body.dark-mode .repeatChildren.drag-inside { background: rgba(76, 141, 255, 0.3) !important; }

  .repeatChildren .block{box-shadow:none; min-height:50px;}
  .addToRepeat{ display:flex; gap:6px; flex-wrap:wrap; width:100%; }
  .addToRepeat button{
    border:none; border-radius:10px; padding:6px 10px; font-size:18px;
    background:rgba(255,255,255,0.85); cursor:pointer;
  }

  .block.running{ outline:4px solid #FFF200; animation:pulse 0.9s infinite; }
  @keyframes pulse{ 0%{transform:scale(1);} 50%{transform:scale(1.03);} 100%{transform:scale(1);} }

  #lockOverlay{ position:fixed; inset:0; background:rgba(255,255,255,0.01); display:none; z-index:5; }
  body.locked #lockOverlay{display:block;}
  body.locked .paletteBtn, body.locked .delBtn, body.locked .outBtn, body.locked .stepper button, body.locked .addToRepeat button, body.locked .rootDropZone{
    pointer-events:none; opacity:0.45;
  }
  body.locked .block{cursor:default;}

  footer{
    position:fixed; left:0; right:0; bottom:0;
    padding:16px 20px calc(16px + env(safe-area-inset-bottom));
    display:flex; align-items:center; justify-content:center; gap:24px;
    background:linear-gradient(180deg, rgba(255,246,224,0) 0%, rgba(255,246,224,0.95) 30%); z-index:10;
  }
  body.dark-mode footer { background:linear-gradient(180deg, rgba(22,33,62,0) 0%, rgba(22,33,62,0.95) 30%); }

  #stopBtn, #runBtn{
    border:none; border-radius:50%; width:96px; height:96px; font-size:15px; color:#fff;
    box-shadow:0 8px 0 rgba(0,0,0,0.15); display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:2px; cursor:pointer; font-family:'Jua',sans-serif;
  }
  #runBtn{background:radial-gradient(circle at 35% 30%, #6FE39B, #2FA968); }
  #runBtn .emoji{font-size:34px;}
  #runBtn:disabled{background:#cfd6e6; box-shadow:0 8px 0 rgba(0,0,0,0.08); cursor:not-allowed;}
  #runBtn:active:not(:disabled){transform:translateY(6px); box-shadow:0 2px 0 rgba(0,0,0,0.15);}

  #stopBtn{ background:radial-gradient(circle at 35% 30%, #FF9C9C, var(--danger)); opacity:0.35; pointer-events:none; }
  #stopBtn.active{opacity:1; pointer-events:auto;}
  #stopBtn:active.active{transform:translateY(6px); box-shadow:0 2px 0 rgba(0,0,0,0.15);}
  #stopBtn .emoji{font-size:30px;}

  #banner{
    position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-140%);
    background:#fff; border-radius:24px; padding:18px 26px; box-shadow:0 10px 24px rgba(0,0,0,0.18);
    font-size:20px; text-align:center; max-width:88vw; z-index:20; transition:transform .25s ease;
    color: #2E3350;
  }
  #banner.show{transform:translateX(-50%) translateY(0);}
  #banner .big{font-size:40px; display:block; margin-bottom:6px;}
</style>

<script>
(function(window) {
  var EventEmitter = function() { this._events = {}; };
  EventEmitter.prototype.on = function(type, listener) {
    this._events[type] = this._events[type] || [];
    this._events[type].push(listener);
    return this;
  };
  EventEmitter.prototype.once = function(type, listener) {
    var self = this;
    function g() { self.removeListener(type, g); listener.apply(this, arguments); }
    this.on(type, g);
    return this;
  };
  EventEmitter.prototype.removeListener = function(type, listener) {
    if (!this._events[type]) return this;
    var idx = this._events[type].indexOf(listener);
    if (idx >= 0) this._events[type].splice(idx, 1);
    return this;
  };
  EventEmitter.prototype.emit = function(type) {
    if (!this._events[type]) return false;
    var args = Array.prototype.slice.call(arguments, 1);
    var listeners = this._events[type].slice();
    for (var i = 0; i < listeners.length; i++) listeners[i].apply(this, args);
    return true;
  };
  var Ros = function(options) {
    EventEmitter.call(this); this.url = options.url; this.idCounter = 0; this.isConnected = false;
    this.socket = new WebSocket(this.url);
    this.socket.onopen = this._onOpen.bind(this); this.socket.onmessage = this._onMessage.bind(this);
    this.socket.onerror = this._onError.bind(this); this.socket.onclose = this._onClose.bind(this);
  };
  Ros.prototype = Object.create(EventEmitter.prototype);
  Ros.prototype._onOpen = function() { this.isConnected = true; this.emit('connection'); };
  Ros.prototype._onMessage = function(data) {
    try {
      var msg = JSON.parse(data.data);
      if (msg.op === 'publish') { this.emit(msg.topic, msg.msg); }
    } catch (e) { console.warn('ROS 메시지 파싱 실패:', e); }
  };
  Ros.prototype._onError = function(err) { this.emit('error', err); };
  Ros.prototype._onClose = function(close) { this.isConnected = false; this.emit('close', close); };
  Ros.prototype.close = function() { try { this.socket.close(); } catch(e) {} };
  Ros.prototype.removeAllListeners = function(type) {
    if (type) { delete this._events[type]; }
    else { this._events = {}; }
  };
  Ros.prototype.callOnConnection = function(message) {
    var self = this;
    if (this.isConnected && this.socket && this.socket.readyState === WebSocket.OPEN) {
      this.socket.send(JSON.stringify(message));
    } else if (this.socket && (this.socket.readyState === WebSocket.CONNECTING || this.socket.readyState === WebSocket.OPEN)) {
      setTimeout(function() { self.callOnConnection(message); }, 100);
    } else {
      console.warn('ROS WebSocket이 닫혀 있어 메시지를 보낼 수 없습니다:', message);
    }
  };
  var Topic = function(options) {
    this.ros = options.ros; this.name = options.name; this.messageType = options.messageType;
    this.isAdvertised = false;
  };
  Topic.prototype.advertise = function() {
    if (this.isAdvertised) return;
    this.ros.callOnConnection({ op: 'advertise', topic: this.name, type: this.messageType });
    this.isAdvertised = true;
  };
  Topic.prototype.subscribe = function(callback) {
    this.ros.on(this.name, callback);
    this.ros.callOnConnection({ op: 'subscribe', topic: this.name, type: this.messageType });
  };
  Topic.prototype.publish = function(message) {
    this.advertise();
    this.ros.callOnConnection({ op: 'publish', topic: this.name, msg: message });
  };
  var Message = function(values) { Object.assign(this, values); };
  window.ROSLIB = { Ros: Ros, Topic: Topic, Message: Message };
})(window);
</script>
</head>
<body>

<div id="lockOverlay"></div>

<header>
  <h1>🤖 로봇 블록 놀이터</h1>
  <div style="display:flex; align-items:center; gap:8px;">
    <button id="darkModeBtn" style="border:none; background:#fff; width:34px; height:34px; border-radius:50%; box-shadow:var(--shadow); cursor:pointer; font-size:16px;">🌙</button>
    <span id="connState" class="bad">연결 안 됨</span>
  </div>
</header>

<div id="connectPanel">
  <input id="wsUrl" placeholder="ws://로봇주소:9090" value="ws://192.168.0.15:9090">
  <button id="connectBtn">연결하기</button>
  <button id="simToggle">🧪 연습 모드</button>
  <button id="exportBtn" style="background:#5b4b9c;">📥 내보내기</button>
  <button id="importBtn" style="background:#5b4b9c;">📤 불러오기</button>
  <input type="file" id="fileInput" accept=".json" style="display:none;">
</div>

<div id="aiPanel">
  <div class="aiTitle">
    <div class="aiTitleText">
      <strong>✨ AI 블록 만들기</strong>
      <small>예: 앞으로 3초 가고 오른쪽으로 돌고, 소리 내고 1초 기다리기</small>
    </div>
    <button id="toggleAiBtn" class="aiToggleBtn">◀ AI 접기</button>
  </div>
  <div id="aiBody" class="aiBody">
    <textarea id="aiPrompt" placeholder="하고 싶은 동작을 말로 적어보세요. 예) 앞으로 2초 → 왼쪽 → 앞으로 1초 → 소리"></textarea>
    <div class="aiControls">
      <button id="aiGenerateBtn">✨ AI로 블록 추가</button>
      <button id="aiReplaceBtn">🔄 AI로 전체 바꾸기</button>
      <button id="aiClearBtn">🧹 입력 지우기</button>
      <button class="aiChip" data-prompt="앞으로 3초 가고 오른쪽으로 돌고 소리 내기">예시 1</button>
      <button class="aiChip" data-prompt="앞으로 2초 가고 왼쪽으로 돌고 1초 기다리고 앞으로 1초">예시 2</button>
      <button class="aiChip" data-prompt="반복 3번: 앞으로 1초 가고 장애물 있으면 뒤로 1초 가기">반복+조건 예시</button>
    </div>
    <div id="aiResult"></div>
  </div>
</div>

<main>
  <section id="palette" aria-label="블록 팔레트">
    <button class="paletteBtn pb-forward" data-op="forward"><span class="emoji">⬆️</span>앞으로</button>
    <button class="paletteBtn pb-backward" data-op="backward"><span class="emoji">⬇️</span>뒤로</button>
    <button class="paletteBtn pb-turn_left" data-op="turn_left"><span class="emoji">↩️</span>왼쪽</button>
    <button class="paletteBtn pb-turn_right" data-op="turn_right"><span class="emoji">↪️</span>오른쪽</button>
    <button class="paletteBtn pb-buzzer" data-op="buzzer"><span class="emoji">🔔</span>소리</button>
    <button class="paletteBtn pb-wait" data-op="wait"><span class="emoji">⏱️</span>기다리기</button>
    <button class="paletteBtn pb-repeat" data-op="repeat"><span class="emoji">🔁</span>반복하기</button>
    <button class="paletteBtn pb-if" data-op="if"><span class="emoji">❓</span>만약에</button>
  </section>

  <section id="programArea">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-shrink:0;">
      <h2>나의 프로그램</h2>

// 🔑 본인의 OpenAI API Key를 입력하세요 (실제 서비스 배포 시 프론트엔드 하드코딩 금지)

const OP_META = {
  forward:  {emoji:'⬆️', label:'앞으로', cls:'forward', hasSec:true},
  backward: {emoji:'⬇️', label:'뒤로 가기', cls:'backward', hasSec:true},
  turn_left:{emoji:'↩️', label:'왼쪽으로 돌기', cls:'turn_left'},
  turn_right:{emoji:'↪️', label:'오른쪽으로 돌기', cls:'turn_right'},

  wait:     {emoji:'⏱️', label:'기다리기', cls:'wait', hasSec:true},
  repeat:   {emoji:'🔁', label:'반복하기', cls:'repeat', hasCount:true},
  if:       {emoji:'❓', label:'만약 앞 장애물 발견하면', cls:'if'}
};

const KOR_NUM = {
  '영':0, '공':0, '한':1, '하나':1, '첫':1, '일':1,
  '두':2, '둘':2, '이':2, '세':3, '셋':3, '삼':3,
  '네':4, '넷':4, '사':4, '다섯':5, '오':5,
  '여섯':6, '육':6, '일곱':7, '칠':7,
  '여덟':8, '팔':8, '아홉':9, '구':9, '열':10, '십':10
};

function wordToNumber(raw, fallback=1){
  if (raw === undefined || raw === null) return fallback;
  const s = String(raw).trim().replace(/번|회|초|동안|만큼/g, '');
  if (!s) return fallback;
  const n = parseFloat(s);
  if (!Number.isNaN(n)) return n;
  return KOR_NUM[s] ?? fallback;
}

function cloneBlockWithoutId(block){
  const nb = newBlock(block.op);
  if (block.sec !== undefined) nb.sec = block.sec;
  if (block.count !== undefined) nb.count = block.count;
  if (block.children) nb.children = block.children.map(cloneBlockWithoutId);
  return nb;
}

function extractSeconds(segment, fallback){
  const secMatch = segment.match(/(\d+(?:\.\d+)?|한|하나|두|둘|세|셋|네|넷|다섯|여섯|일곱|여덟|아홉|열)\s*(초|sec|second|seconds)/i);
  if (secMatch) return Math.max(0.5, Math.min(10, wordToNumber(secMatch[1], fallback)));
  const longMatch = segment.match(/(잠깐|조금)/);
  if (longMatch) return 1;
  return fallback;
}

function makeAiBlock(op, segment=''){
  const b = newBlock(op);
  if (op === 'forward' || op === 'backward') b.sec = extractSeconds(segment, b.sec ?? 3);
  if (op === 'wait') b.sec = extractSeconds(segment, b.sec ?? 1);
  return b;
}

function commandMatches(text){
  const patterns = [
    {op:'forward', re:/(앞으로|전진|앞\s*으로|go\s*forward|forward)/ig},
    {op:'backward', re:/(뒤로|후진|뒤\s*로|backward|back)/ig},
    {op:'turn_left', re:/(왼쪽|좌회전|왼\s*쪽|left)/ig},
    {op:'turn_right', re:/(오른쪽|우회전|오른\s*쪽|right)/ig},
    {op:'buzzer', re:/(소리|부저|삐|알림|경고음|buzzer|beep|sound)/ig},
    {op:'wait', re:/(기다|대기|쉬|멈춰서|wait|pause|sleep)/ig}
  ];
  const matches = [];
  for (const p of patterns){
    let m;
    while ((m = p.re.exec(text)) !== null){
      matches.push({op:p.op, index:m.index, end:p.re.lastIndex});
    }
  }
  return matches.sort((a,b)=>a.index-b.index);
}

function parseSimpleCommands(text){
  const matches = commandMatches(text);
  const blocks = [];
  if (matches.length === 0) return blocks;
  for (let i=0; i<matches.length; i++){
    const cur = matches[i];
    const next = matches[i+1];
    const segment = text.slice(cur.index, next ? next.index : text.length);
    blocks.push(makeAiBlock(cur.op, segment));
  }
  return blocks;
}

// 로컬(규칙 기반) 자연어 처리 엔진 (API 키 없을 때 동작)
function parseNaturalLanguageToBlocks(rawText){
  const text = rawText
    .replace(/\n/g, ' ')
    .replace(/그리고|그다음|다음에|후에|한다음|하고나서/g, ' 그리고 ')
    .trim();
  
  let repeatCount = 0;
  let innerText = text;
  
  const rm1 = text.match(/반복\s*(\d+(?:\.\d+)?|한|하나|두|둘|세|셋|네|넷|다섯|여섯|일곱|여덟|아홉|열)\s*(번|회)?\s*[:：,-]?\s*(.+)/i);
  const rm2 = text.match(/(.+?)\s*(\d+(?:\.\d+)?|한|하나|두|둘|세|셋|네|넷|다섯|여섯|일곱|여덟|아홉|열)\s*(번|회)\s*반복/i);
  
  if (rm1 && rm1[3]) {
    repeatCount = wordToNumber(rm1[1], 2);
    innerText = rm1[3];
  } else if (rm2 && rm2[1]) {
    repeatCount = wordToNumber(rm2[2], 2);
    innerText = rm2[1];
  }

  const ifSplit = innerText.split(/만약|장애물이\s*있으면|장애물\s*감지|만나면|발견하면|앞에\s*장애물|부딪|위험|if/i);
  let mainBlocks = [];
  
  if (ifSplit.length > 1) {
    mainBlocks = parseSimpleCommands(ifSplit[0]); 
    let thenBlocks = parseSimpleCommands(ifSplit.slice(1).join(' ')); 
    if (thenBlocks.length === 0) {
      thenBlocks = [makeAiBlock('buzzer'), makeAiBlock('backward', '뒤로 1초')];
    }
    const ifb = newBlock('if');
    ifb.children = thenBlocks;
    mainBlocks.push(ifb);
  } else {
    mainBlocks = parseSimpleCommands(innerText);
  }

  if (repeatCount > 0) {
    if (mainBlocks.length > 0) {
      const rb = newBlock('repeat');
      rb.count = Math.max(2, Math.min(10, repeatCount));
      rb.children = mainBlocks;
      return [rb];
    }
    return [];
  }

  const fallback = text.match(/(\d+|한|하나|두|둘|세|셋|네|넷|다섯|여섯|일곱|여덟|아홉|열)\s*(번|회)/);
  if (!/반복/.test(text) && !/초|sec|second/i.test(text) && mainBlocks.length === 1 && fallback) {
    const rb = newBlock('repeat');
    rb.count = Math.max(2, Math.min(10, wordToNumber(fallback[1], 2)));
    rb.children = [cloneBlockWithoutId(mainBlocks[0])];
    return [rb];
  }

  return mainBlocks;
}

// --------------------------------------------------------------------------
// 🧠 GPT API 연동 관련 로직 시작

// GPT JSON 응답을 id가 있는 실제 블록 객체 배열로 변환
function convertGPTToBlocks(gptList) {
  return gptList.map(item => {
    const b = newBlock(item.op);
    if (item.sec !== undefined) b.sec = item.sec;
    if (item.count !== undefined) b.count = item.count;
    if (item.children) b.children = convertGPTToBlocks(item.children);
    return b;
  });
}

// GPT API 비동기 호출
async function fetchGPTBlocks(userText) {
  // API Key가 없거나 기본값이면 기존 규칙 기반 엔진으로 즉시 실행
  if (!OPENAI_API_KEY || OPENAI_API_KEY === "sk-본인의_API_키_입력") {
    console.log("⚠️ API Key가 설정되지 않아 로컬(규칙 기반) 엔진으로 동작합니다.");
    return parseNaturalLanguageToBlocks(userText);
  }

  const prompt = `
  너는 로봇 코딩 블록을 생성하는 AI야. 사용자의 자연어 명령을 분석해서 반드시 아래 규칙에 맞는 JSON 배열로만 응답해.
  사용 가능한 op(명령어):
  - forward (sec: 초)
  - backward (sec: 초)
  - turn_left
  - turn_right
  - buzzer
  - wait (sec: 초)
  - repeat (count: 반복횟수, children: 내부에 들어갈 블록 배열)
  - if (children: 내부에 들어갈 블록 배열)
  
  예시 입력: "앞으로 2초 가고 3번 반복해(소리 내고 1초 기다리기)"
  예시 출력:
  [
    {"op": "forward", "sec": 2},
    {"op": "repeat", "count": 3, "children": [
      {"op": "buzzer"},
      {"op": "wait", "sec": 1}
    ]}
  ]
  설명이나 마크다운 코드블록(\`\`\`) 없이 순수 JSON 배열만 반환해.
  `;

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4o-mini", // 빠르고 저렴한 모델
        messages: [
          { role: "system", content: prompt },
          { role: "user", content: userText }
        ],
        temperature: 0.1
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);
    
    let resultText = data.choices[0].message.content.trim();
    // GPT가 마크다운(```json)을 붙여서 응답할 경우를 대비하여 텍스트 정제
    resultText = resultText.replace(/^```json/, '').replace(/^```/, '').replace(/```$/, '').trim();
    
    const parsedData = JSON.parse(resultText);
    return convertGPTToBlocks(parsedData);

  } catch (error) {
    console.error("GPT API 에러:", error);
    return null;
  }
}

// AI 적용 함수 (비동기로 변경)
async function applyAiBlocks(replace = false) {
  if (running) return;
  const input = document.getElementById('aiPrompt');
  const text = input.value.trim();
  if (!text){ showBanner('💬', '명령을 먼저 적어주세요!', 1500); return; }

  // 비동기로 블록 정보 가져오기 (GPT 또는 로컬 규칙)
  const blocks = await fetchGPTBlocks(text);

  if (!blocks || !blocks.length){ 
    resultEl.innerHTML = '😅 AI가 이해하지 못했거나 연결 오류가 발생했어요. 다시 시도해주세요.';
    playErrorSound(); 
    return; 
  }

  // 성공적으로 받아오면 프리뷰 표시
  previewAiBlocks(blocks);

  // 기존 블록 덮어쓰거나 추가
  if (replace) program = blocks;
  else program.push(...blocks);
  
  render();
  showBanner('✨', replace ? 'AI가 프로그램을 바꿨어요!' : 'AI가 블록을 추가했어요!', 1800);
}

// 🧠 GPT API 연동 관련 로직 끝

function previewAiBlocks(blocks){
  function blockLabel(b){
    const meta = OP_META[b.op] || {emoji:'❔', label:b.op};
    let extra = '';
    if (b.sec !== undefined) extra = ` ${b.sec}초`;
    if (b.count !== undefined) extra = ` ${b.count}회`;
    if (b.children) extra += ` 안에 ${b.children.length}개`;
    return `<span class="aiPreviewBlock">${meta.emoji} ${meta.label}${extra}</span>`;
  }
  const resultEl = document.getElementById('aiResult');
  if (!blocks.length){
    resultEl.style.display = 'block';
    resultEl.innerHTML = '😅 아직 이해하지 못했어요. 예: <b>앞으로 2초 가고 오른쪽으로 돌고 소리 내기</b>';
    return;
  }
  resultEl.style.display = 'block';
  resultEl.innerHTML = '<b>생성된 블록</b><br>' + blocks.map(blockLabel).join('');
}

function extractBlock(id, list = program) {
  for (let i = 0; i < list.length; i++) {
    if (list[i].id === id) return list.splice(i, 1)[0];
    if (list[i].children) {
      const found = extractBlock(id, list[i].children);
      if (found) return found;
    }
  }
  return null;
}

function findBlock(id, list = program) {
  for (const b of list) {
    if (b.id === id) return b;
    if (b.children) {
      const found = findBlock(id, b.children);
      if (found) return found;
    }
  }
  return null;
}

function findParentListAndIndex(targetId, list = program) {
  for (let i = 0; i < list.length; i++) {
    if (list[i].id === targetId) return { list, index: i };
    if (list[i].children) {
      const res = findParentListAndIndex(targetId, list[i].children);
      if (res) return res;
    }
  }
  return null;
}

function isDescendant(parentId, targetId) {
  const parent = findBlock(parentId);
  if (!parent) return false;
  if (parent.id === targetId) return true;
  function check(node) {
    if (node.id === targetId) return true;
    if (node.children) {
      for (const c of node.children) {
        if (check(c)) return true;
      }
    }
    return false;
  }
  return check(parent);
}

function playLaptopBuzzer() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99, 1046.50]; 
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i + 1) * 0.08);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.08); osc.stop(ctx.currentTime + (i + 1) * 0.08);
    });
  } catch(e) {}
}

function playErrorSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [493.88, 349.23]; 
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i + 1) * 0.15);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.15); osc.stop(ctx.currentTime + (i + 1) * 0.15);
    });
  } catch(e) {}
}

function newBlock(op){
  const b = {id: idSeq++, op};
  if (op === 'forward' || op === 'backward') b.sec = 3; 
  if (op === 'wait') b.sec = 1;
  if (op === 'repeat'){ b.count = 2; b.children = []; }
  if (op === 'if'){ b.children = []; }
  return b;
}

function removeBlock(id, list=program){
  const idx = list.findIndex(b=>b.id===id);
  if (idx>=0){ list.splice(idx,1); return true; }
  for (const b of list){
    if (b.children && removeBlock(id, b.children)) return true;
  }
  return false;
}

function findContainerInfoForChild(targetId, list=program, parentBlock=null){
  for (let i=0; i<list.length; i++){
    const b = list[i];
    if (b.id === targetId) return { list, index:i, parentBlock };
    if (b.children){
      const res = findContainerInfoForChild(targetId, b.children, b);
      if (res) return res;
    }
  }
  return null;
}

function moveBlockOneLevelOut(id){
  const info = findContainerInfoForChild(id);
  if (!info || !info.parentBlock) return false;
  const [moved] = info.list.splice(info.index, 1);
  const parentInfo = findParentListAndIndex(info.parentBlock.id);
  if (moved && parentInfo){
    parentInfo.list.splice(parentInfo.index + 1, 0, moved);
    render();
    showBanner('↗️', '블록을 밖으로 뺐어요!', 1200);
    return true;
  }
  return false;
}

function renderRootDropZone(){
  const zone = document.createElement('li');
  zone.className = 'rootDropZone';
  zone.textContent = '↧ 반복/만약 안의 블록을 여기로 끌면 맨 밖으로 빠져요';
  zone.addEventListener('dragover', (e) => {
    e.preventDefault(); e.stopPropagation();
    if (!running && dragSrcId !== null){
      clearDragMarkers(); zone.classList.add('drag-root');
    }
  });
  zone.addEventListener('dragleave', (e) => {
    e.stopPropagation(); zone.classList.remove('drag-root');
  });
  zone.addEventListener('drop', (e) => {
    e.preventDefault(); e.stopPropagation();
    zone.classList.remove('drag-root');
    if (running || dragSrcId == null) return;
    const draggedBlock = extractBlock(dragSrcId);
    if (draggedBlock){
      if (zone.dataset.position === 'top') {
        program.unshift(draggedBlock);
        render(); showBanner('↥', '맨 위/맨 밖으로 옮겼어요!', 1200);
      } else {
        program.push(draggedBlock);
        render(); showBanner('↧', '맨 아래/맨 밖으로 옮겼어요!', 1200);
      }
    }
    dragSrcId = null;
  });
  return zone;
}

function clearDragMarkers(){
  document.querySelectorAll('.drag-top, .drag-bottom, .drag-inside, .drag-root').forEach(el => {
    el.classList.remove('drag-top', 'drag-bottom', 'drag-inside', 'drag-root');
  });
}

function render(){
  listEl.innerHTML = '';
  listEl.appendChild(emptyHint);
  
  if(program.length > 0) {
    emptyHint.style.display = 'none';
    const topZone = renderRootDropZone();
    topZone.textContent = '↥ 여기에 놓으면 맨 위/맨 밖으로 빠져요';
    topZone.dataset.position = 'top';
    listEl.appendChild(topZone);
    program.forEach(b => listEl.appendChild(renderBlock(b, 0)));
    listEl.appendChild(renderRootDropZone());
  } else {
    emptyHint.style.display = 'block';
  }
}

function renderBlock(b, depth=0){
  const meta = OP_META[b.op];
  const li = document.createElement('li');
  li.className = `block b-${meta.cls}`;
  li.dataset.id = b.id; li.draggable = !running;

  const emoji = document.createElement('span');
  emoji.className = 'emoji'; emoji.textContent = meta.emoji;
  li.appendChild(emoji);

  const label = document.createElement('span');
  label.className = 'label'; label.textContent = meta.label;
  li.appendChild(label);
  if (meta.hasSec){ li.appendChild(makeStepper(b.sec, 0.5, 0.5, 10, v=>{ b.sec = v; })); }
  if (meta.hasCount){ li.appendChild(makeStepper(b.count, 1, 2, 10, v=>{ b.count = v; }, '회')); }

  if (depth > 0){
    const out = document.createElement('button');
    out.className = 'outBtn'; out.title = '이 블록을 한 단계 바깥으로 빼기'; out.textContent = '↗ 밖으로';
    out.onclick = (e)=>{ e.stopPropagation(); moveBlockOneLevelOut(b.id); };
    li.appendChild(out);
  }

  const del = document.createElement('button');
  del.className = 'delBtn'; del.textContent = '✕';
  del.onclick = (e)=>{ e.stopPropagation(); removeBlock(b.id); render(); };
  li.appendChild(del);

  if (b.op === 'repeat' || b.op === 'if'){
    const childWrap = document.createElement('div');
    childWrap.className = 'repeatChildren';
    b.children.forEach(cb => childWrap.appendChild(renderBlock(cb, depth + 1)));

    const addRow = document.createElement('div');
    addRow.className = 'addToRepeat';
    ['forward','backward','turn_left','turn_right','buzzer','wait','repeat','if'].forEach(op=>{
      const m = OP_META[op];
      const btn = document.createElement('button'); btn.textContent = m.emoji;
      btn.onclick = (e)=>{ e.stopPropagation(); b.children.push(newBlock(op)); render(); };
      addRow.appendChild(btn);
    });
    childWrap.appendChild(addRow);
    li.appendChild(childWrap);

    childWrap.addEventListener('dragover', (e) => {
      e.preventDefault(); e.stopPropagation(); 
      if (!running && dragSrcId !== null && dragSrcId !== b.id && !isDescendant(dragSrcId, b.id)) {
        clearDragMarkers(); childWrap.classList.add('drag-inside');
      }
    });
    childWrap.addEventListener('dragleave', (e) => { e.stopPropagation(); childWrap.classList.remove('drag-inside'); });
    childWrap.addEventListener('drop', (e) => {
      e.preventDefault(); e.stopPropagation(); childWrap.classList.remove('drag-inside');
      if (running || dragSrcId == null || dragSrcId === b.id) return;
      if (isDescendant(dragSrcId, b.id)) { showBanner('⚠️', '안에 넣을 수 없어요!', 1500); return; }
      const draggedBlock = extractBlock(dragSrcId);
      if (draggedBlock) { b.children.push(draggedBlock); render(); }
      dragSrcId = null;
    });
  }

  li.addEventListener('dragstart', (e)=>{ 
    if(running) { e.preventDefault(); return; }
    e.stopPropagation(); li.classList.add('dragging'); dragSrcId = b.id; 
    const ghost = document.createElement('div');
    ghost.style.position = 'absolute'; ghost.style.top = '-1000px';
    ghost.style.background = getComputedStyle(li).backgroundColor; ghost.style.color = '#fff'; ghost.style.padding = '10px 18px';
    ghost.style.borderRadius = '16px'; ghost.style.fontFamily = "'Jua', sans-serif";
    ghost.style.fontSize = '18px'; ghost.style.boxShadow = 'var(--shadow)';
    ghost.textContent = meta.emoji + ' ' + meta.label;
    document.body.appendChild(ghost);
    e.dataTransfer.setDragImage(ghost, 20, 20);
    setTimeout(() => document.body.removeChild(ghost), 0);
  });
  li.addEventListener('dragend', (e)=> {
    e.stopPropagation(); li.classList.remove('dragging'); clearDragMarkers(); dragSrcId = null;
  });
  li.addEventListener('dragover', (e)=>{ 
    e.preventDefault(); e.stopPropagation();
    if (running || dragSrcId == null || dragSrcId === b.id || isDescendant(dragSrcId, b.id)) return;
    const rect = li.getBoundingClientRect(); const offsetY = e.clientY - rect.top;
    let headerHeight = (b.op === 'repeat' || b.op === 'if') ? 60 : rect.height; 
    clearDragMarkers();
    if (offsetY < headerHeight / 2) { li.classList.add('drag-top'); dragOverPosition = 'top';
    } else if (offsetY <= headerHeight) { li.classList.add('drag-bottom'); dragOverPosition = 'bottom'; }
  });
  li.addEventListener('dragleave', (e)=>{ e.stopPropagation(); li.classList.remove('drag-top', 'drag-bottom'); });
  li.addEventListener('drop', (e)=>{
    e.preventDefault(); e.stopPropagation(); li.classList.remove('drag-top', 'drag-bottom');
    if (running || dragSrcId == null || dragSrcId === b.id) return;
    if (isDescendant(dragSrcId, b.id)) { showBanner('⚠️', '자신 안에 넣을 수 없어요!', 1500); return; }
    const draggedBlock = extractBlock(dragSrcId);
    if (draggedBlock) {
        const targetInfo = findParentListAndIndex(b.id);
        if (targetInfo) {
            let insertIdx = targetInfo.index;
            if (dragOverPosition === 'bottom') insertIdx += 1;
            targetInfo.list.splice(insertIdx, 0, draggedBlock); 
        } else { program.push(draggedBlock); }
        render();
    }
    dragSrcId = null;
  });
  return li;
}

function makeStepper(value, step, min, max, onChange, suffix=''){
  const wrap = document.createElement('div'); wrap.className = 'stepper';
  const minus = document.createElement('button'); minus.textContent = '−';
  const val = document.createElement('span'); val.className = 'val';
  const plus = document.createElement('button'); plus.textContent = '+';
  let cur = value;
  function paint(){ val.textContent = (Number.isInteger(step)? cur : cur.toFixed(1)) + suffix + (suffix? '' : '초'); }
  paint();
  minus.onclick = (e)=>{ e.stopPropagation(); cur = Math.max(min, +(cur-step).toFixed(1)); onChange(cur); paint(); };
  plus.onclick  = (e)=>{ e.stopPropagation(); cur = Math.min(max, +(cur+step).toFixed(1)); onChange(cur); paint(); };
  wrap.appendChild(minus); wrap.appendChild(val); wrap.appendChild(plus);
  return wrap;
}

function serializeProgram(list) {
  const out = [];
  for (const b of list) {
    if (b.op === 'repeat') {
      const inner = serializeProgram(b.children);
      for (let i = 0; i < (b.count || 1); i++) {
        out.push(...JSON.parse(JSON.stringify(inner)));
      }
    } else if (b.op === 'if') {
      out.push({ op: 'if', cond: 'front_obstacle', then: serializeProgram(b.children) });
    } else {
      const {id, children, ...rest} = b;
      out.push(rest);
    }
  }
  return out;
}

const KID_REASONS = {
  '장애물 감지': ['🙈', '앞에 장애물이 있어요! 정지했어요.'],
  '사용자 중지': ['✋', '멈췄어요!']
};

function normalizeReason(reason=''){
  const r = String(reason || '').toLowerCase();
  if (/장애물|obstacle|front|위험|거리|range/.test(r)) return '장애물 감지';
  if (/사용자|user|stop|cancel|중지/.test(r)) return '사용자 중지';
  return reason || '멈췄어요';
}

function parseRunStateMessage(msg){
  let rawStr = "";
  if (msg && typeof msg.data === 'string') rawStr = msg.data.trim();
  else if (typeof msg === 'string') rawStr = msg.trim();
  else if (msg && typeof msg === 'object') rawStr = (msg.data || "").toString().trim();
  if (!rawStr) return null;

  try { return JSON.parse(rawStr); } 
  catch(e) {
    const lower = rawStr.toLowerCase();
    if (/장애물|obstacle|front|danger|range/.test(lower)) return { state: 'aborted', reason: '장애물 감지' };
    if (/done|완료/.test(lower)) return { state: 'done' };
    if (/stop|중지|멈/.test(lower)) return { state: 'aborted', reason: '사용자 중지' };
    return { state: rawStr };
  }
}

function publishZeroVelocity(times=3){
  if (!cmdVelTopic || !ros || !ros.isConnected) return;
  const zero = new ROSLIB.Message({ linear: {x:0, y:0, z:0}, angular:{x:0, y:0, z:0} });
  for (let i=0; i<times; i++) setTimeout(() => { try { cmdVelTopic.publish(zero); } catch(e) {} }, i * 120);
}

function handleObstacleBool(msg, source){
  if (msg && msg.data === true) console.log('장애물 감지(bool):', source);
}

function handleRangeObstacle(msg, source){
  if (!msg) return;
  const range = Number(msg.range);
  if (Number.isFinite(range) && range <= OBSTACLE_RANGE_THRESHOLD_M) console.log('장애물 감지(range):', source, range);
}

function handleObstacleDistFloat(msg, source){
  if (!msg) return;
  const dist = Number(msg.data);
  if (Number.isFinite(dist) && dist < OBSTACLE_RANGE_THRESHOLD_M) console.log('장애물 감지(float):', source, dist);
}

function subscribeObstacleSafetyTopics(){
  obstacleTopics = [];
  const floatDistTopics = [{ name: '/obstacle_dist/front', label: '전방' }, { name: '/obstacle_dist/rear',  label: '후방' }];
  floatDistTopics.forEach(({name, label}) => {
    try {
      const t = new ROSLIB.Topic({ ros, name, messageType:'std_msgs/msg/Float32' });
      t.subscribe((msg)=>handleObstacleDistFloat(msg, `${label}(${name})`)); obstacleTopics.push(t);
    } catch(e) {}
  });
  const boolTopics = ['/obstacle', '/front_obstacle', '/obstacle_detected'];
  boolTopics.forEach(name => {
    try {
      const t = new ROSLIB.Topic({ ros, name, messageType:'std_msgs/msg/Bool' });
      t.subscribe((msg)=>handleObstacleBool(msg, name)); obstacleTopics.push(t);
    } catch(e) {}
  });
  const rangeTopics = ['/range', '/ultrasonic_range'];
  rangeTopics.forEach(name => {
    try {
      const t = new ROSLIB.Topic({ ros, name, messageType:'sensor_msgs/msg/Range' });
      t.subscribe((msg)=>handleRangeObstacle(msg, name)); obstacleTopics.push(t);
    } catch(e) {}
  });
}

function highlightActiveBlock(op) {
  clearHighlights();
  if (!op) return;
  const blocks = document.querySelectorAll(`.block.b-${op}`);
  if (blocks.length > 0) blocks[0].classList.add('running');
}

function handleRunState(s){
  if (!s) return;
  if (typeof s === 'string' || (s && s.data !== undefined)) s = parseRunStateMessage(s);
  if (!s || !s.state) return;
  
  const state = String(s.state).toLowerCase();
  const reason = normalizeReason(s.reason || s.message || state);

  if (state === 'running'){
    setLocked(true);
  } else if (state === 'block'){
    highlightActiveBlock(s.op);
    if (s.op === 'buzzer') playLaptopBuzzer();
  } else if (state === 'done' || state === 'complete' || state === 'finished'){
    clearHighlights(); setLocked(false); showBanner('🎉','완료!', 2200); confettiBurst();
  } else if (state === 'aborted' || state === 'abort' || state === 'stopped' || state === 'stop' || state === 'obstacle'){
    clearHighlights(); setLocked(false); 
    const [emoji, text] = KID_REASONS[reason] || ['⚠️', reason || '멈췄어요'];
    showBanner(emoji, text, 3000); 
    if (reason === '장애물 감지') { playErrorSound(); publishZeroVelocity(3); }
  }
}

function confettiBurst(){
  for (let i=0;i<24;i++){
    const p = document.createElement('div');
    const colors = ['#3FB27F','#4C8DFF','#FFC93C','#A784FF','#FF7A59'];
    p.style.position='fixed'; p.style.left = (45+Math.random()*10)+'vw'; p.style.top = '30vh';
    p.style.width='10px'; p.style.height='10px'; p.style.background = colors[i%colors.length];
    p.style.borderRadius='3px'; p.style.zIndex=30; p.style.pointerEvents='none';
    const dx = (Math.random()-0.5)*300; const dy = 200+Math.random()*200; const rot = Math.random()*360;
    document.body.appendChild(p);
    p.animate([ {transform:'translate(0,0) rotate(0deg)', opacity:1}, {transform:`translate(${dx}px,${dy}px) rotate(${rot}deg)`, opacity:0} ], {duration:900+Math.random()*400, easing:'ease-out'});
    setTimeout(()=>p.remove(), 1400);
  }
}

runBtn.addEventListener('click', ()=>{
  if (running) return;
  if (program.length===0) { showBanner('🧱', '먼저 블록을 추가해주세요!', 1500); return; }
  const serialized = serializeProgram(program);
  if (simMode){ runSimulation(serialized); return; }
  if (!ros || !ros.isConnected || !progTopic){
    showBanner('🔌', '로봇 연결 후 실행해주세요. 연습은 연습 모드를 켜세요!', 2200);

  }

});

  if (ros && ros.isConnected && stopTopic){
    stopTopic.publish(new ROSLIB.Message({ data: true }));

  }
  if (running) handleRunState({state:'aborted', reason:'사용자 중지'});
});

function flattenForSim(list){
  const out = [];
  for (const b of list){
    if (b.op === 'repeat'){
      const inner = flattenForSim(b.blocks || []);
      for (let i=0;i<(b.count || 1);i++) out.push(...inner);
    } else if (b.op === 'if') { 
      out.push({ op: 'if', sec: 0.5 }); 
      out.push(...flattenForSim(b.then || []));
    } else { out.push(b); }
  }
  return out;
}

let simTimer = null, simIdx = 0, simFlat = [];
function runSimulation(serialized){
  simFlat = flattenForSim(serialized); simIdx = 0;
  handleRunState({state:'running', total: simFlat.length}); simStep();
}
function simStep(){
  if (simIdx >= simFlat.length){ handleRunState({state:'done'}); return; }
  const left = simFlat.length - simIdx - 1;
  handleRunState({state:'block', op:simFlat[simIdx].op, left});
  const dur = (simFlat[simIdx].sec ?? (simFlat[simIdx].op==='buzzer'?0.5: (simFlat[simIdx].op.startsWith('turn')?1:0.6))) * 1000;
  simTimer = setTimeout(()=>{ simIdx++; simStep(); }, Math.max(300, dur*300/1000+300));
}
function stopSimulation(){ clearTimeout(simTimer); handleRunState({state:'aborted', reason:'사용자 중지'}); }

document.getElementById('connectBtn').addEventListener('click', () => {

let reconnectTimer = null;
let isConnectingNow = false; 

function connectRos(url){
  if (isConnectingNow) return;
  isConnectingNow = true;

  if (reconnectTimer) {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }

  if (ros) {
    try {
      ros.removeAllListeners('close');
      ros.removeAllListeners('error');
      ros.close();
    } catch(e) { console.error(e); }
  }

  console.log("ROS 연결 시도 중...", url);
  ros = new ROSLIB.Ros({ url });

  ros.on('connection', ()=>{
    isConnectingNow = false;
    connStateEl.textContent = '연결됨'; connStateEl.className = 'ok';
    progTopic = new ROSLIB.Topic({ ros, name:'/program', messageType:'std_msgs/msg/String' });
    stopTopic = new ROSLIB.Topic({ ros, name:'/run_stop', messageType:'std_msgs/msg/Bool' });
    stateTopic = new ROSLIB.Topic({ ros, name:'/run_state', messageType:'std_msgs/msg/String' });
    cmdVelTopic = new ROSLIB.Topic({ ros, name:'/cmd_vel', messageType:'geometry_msgs/msg/Twist' });
    try { progTopic.advertise(); stopTopic.advertise(); cmdVelTopic.advertise(); } catch(e) {}
    stateTopic.subscribe((msg)=>{ try{ handleRunState(parseRunStateMessage(msg)); } catch(e){} });
    subscribeObstacleSafetyTopics();
    showBanner('🛡️', '장애물 안전 감시가 켜졌어요!', 1400);
  });

  ros.on('error', ()=>{ 
    isConnectingNow = false;
    connStateEl.textContent = '연결 오류'; connStateEl.className = 'bad'; 
  });

  ros.on('close', ()=>{ 
    isConnectingNow = false;
    connStateEl.textContent = '재연결 중...'; connStateEl.className = 'bad';
    clearHighlights(); setLocked(false);
    
    try {
      ros.removeAllListeners('close');
      ros.removeAllListeners('error');
    } catch(e){}

    clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(() => { if (!simMode) connectRos(url); }, 3000);
  });
}

document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      function rebuild(list) {
        return list.map(b => {
          const nb = newBlock(b.op);
          if (b.sec !== undefined) nb.sec = b.sec;
          if (b.count !== undefined) nb.count = b.count;
          if (b.blocks) nb.children = rebuild(b.blocks);
          if (b.then) nb.children = rebuild(b.then);
          return nb;
        });
      }
      program = rebuild(parsed); render(); showBanner('📤', '프로그램을 불러왔습니다!', 1500);
    } catch(err) { showBanner('❌', '파일 형식이 잘못되었습니다.', 2000); }
    e.target.value = ''; 
  };
  reader.readAsText(file);
});

let saveTimer;
const oldRender = render;
render = function() {
  oldRender(); clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { localStorage.setItem('robot_blocks', JSON.stringify(serializeProgram(program))); }, 500); 
};

window.addEventListener('load', () => {
  const data = localStorage.getItem('robot_blocks');
  if (data) {
    try {
      const parsed = JSON.parse(data);
      function rebuild(list) {
        return list.map(b => {
          const nb = newBlock(b.op);
          if (b.sec !== undefined) nb.sec = b.sec;
          if (b.count !== undefined) nb.count = b.count;
          if (b.blocks) nb.children = rebuild(b.blocks);
          if (b.then) nb.children = rebuild(b.then);
          return nb;
        });
      }
      program = rebuild(parsed); oldRender(); 
    } catch(e) {}
  }
});
render();
